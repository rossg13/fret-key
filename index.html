<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fret-Key Synchronizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --primary: #00d4ff; 
            --accent: #ff4444;  
            --bg: #0a0a0c;
            --card: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% -20%, #222, #0a0a0c);
        }

        h1 {
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            display: flex; 
            gap: 12px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            justify-content: center;
        }

        select, button { 
            padding: 10px 16px; 
            border-radius: 8px; 
            background: #2a2a30; 
            color: white; 
            border: 1px solid #444; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.2s;
        }

        button { background: var(--primary); color: #000; border: none; font-size: 11px; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }

        .inv-btn { background: #333; color: #aaa; }
        .inv-btn.active-inv { background: #fff; color: #000; }

        /* Piano */
        .piano-container { 
            width: 95vw; max-width: 1000px; overflow-x: auto; 
            background: #000; padding: 15px; border-radius: 12px; 
            margin-bottom: 30px; border: 1px solid #333;
        }
        .piano { display: inline-flex; height: 140px; position: relative; }
        .key { 
            width: 35px; background: linear-gradient(to bottom, #ddd, #fff 95%, #bbb); 
            border: 1px solid #111; border-radius: 0 0 5px 5px; cursor: pointer; flex-shrink: 0;
            position: relative;
        }
        .key.black { 
            background: linear-gradient(to bottom, #000, #333 90%, #111); 
            width: 24px; height: 65%; margin-left: -12px; margin-right: -12px; z-index: 2;
        }
        .key.active { background: var(--primary) !important; box-shadow: 0 0 20px var(--primary); }
        .key[data-note="C4"] { border-bottom: 5px solid var(--accent); }

        /* Fretboard */
        .fretboard-wrapper { display: flex; align-items: center; width: 95vw; overflow-x: auto; padding-bottom: 20px; }
        .string-labels { display: flex; flex-direction: column; justify-content: space-around; height: 210px; margin-right: 15px; color: var(--primary); font-weight: bold; }
        .fretboard-container { position: relative; display: flex; background: #241911; border-radius: 4px; box-shadow: 0 10px 30px #000; }
        .fretboard { display: flex; flex-direction: column; border: 2px solid #1a110a; }
        .nut { width: 12px; background: #d2d2d2; border-right: 4px solid #000; height: 100%; position: absolute; left: 59px; z-index: 5; }
        .string { display: flex; height: 35px; align-items: center; position: relative; }
        .fret { width: 65px; height: 100%; border-right: 2px solid #777; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; flex-shrink: 0; }
        .string-wire { position: absolute; width: 100%; height: var(--thick); background: linear-gradient(to bottom, #999, #eee, #999); z-index: 1; pointer-events: none; }
        
        .note-glow { 
            width: 24px; height: 24px; background: var(--primary); border-radius: 50%; z-index: 10; 
            display: none; color: black; font-size: 10px; font-weight: 900; line-height: 24px; text-align: center;
        }
        .note-glow.active { display: block; transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }
        .note-glow.root-note { background: var(--accent) !important; color: white; box-shadow: 0 0 15px var(--accent); }
        
        .fret-dot { position: absolute; width: 12px; height: 12px; background: rgba(255, 255, 255, 0.456); border-radius: 50%; z-index: 0; display: none; }
        .string:nth-child(4) .fret-3 .fret-dot, 
.string:nth-child(4) .fret-5 .fret-dot, 
.string:nth-child(4) .fret-7 .fret-dot, 
.string:nth-child(4) .fret-9 .fret-dot,
.string:nth-child(4) .fret-15 .fret-dot,
.string:nth-child(4) .fret-17 .fret-dot,
.string:nth-child(4) .fret-19 .fret-dot,
.string:nth-child(4) .fret-21 .fret-dot { 
    display: block; 
}
.string:nth-child(2) .fret-12 .fret-dot,
.string:nth-child(5) .fret-12 .fret-dot {
    display: block;
    width: 12px;
    height: 12px;
    background: rgba(255, 255, 255, 0.6);
}
    </style>
</head>
<body>

    <h1>Fret-Key Synchronizer</h1>

    <div class="controls">
        <select id="rootSelect">
            <option value="C">C</option><option value="C#">C#</option><option value="D">D</option>
            <option value="D#">D#</option><option value="E">E</option><option value="F">F</option>
            <option value="F#">F#</option><option value="G">G</option><option value="G#">G#</option>
            <option value="A">A</option><option value="A#">A#</option><option value="B">B</option>
        </select>
        <select id="typeSelect">
            <option value="major">Major Triad</option><option value="minor">Minor Triad</option>
        </select>
        <button class="inv-btn active-inv" onclick="setInv(0, this)">Root</button>
        <button class="inv-btn" onclick="setInv(1, this)">1st Inv</button>
        <button class="inv-btn" onclick="setInv(2, this)">2nd Inv</button>
        <button onclick="visualizeChord()">Visualize & Play</button>
        <button style="background:#444; color:white;" onclick="clearVisuals()">Clear</button>
    </div>

    <div class="piano-container"><div class="piano" id="piano"></div></div>

    <div class="fretboard-wrapper">
        <div class="string-labels"><div>E</div><div>B</div><div>G</div><div>D</div><div>A</div><div>E</div></div>
        <div class="fretboard-container">
            <div class="nut"></div>
            <div class="fretboard" id="fretboard"></div>
        </div>
    </div>

    <script>
        const piano = document.getElementById('piano');
        const fretboard = document.getElementById('fretboard');
        const reverb = new Tone.Reverb({ decay: 2, wet: 0.3 }).toDestination();
        const synth = new Tone.PolySynth(Tone.Synth).connect(reverb);
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const guitarTuning = ['E4', 'B3', 'G3', 'D3', 'A2', 'E2'];
        let currentInv = 0;

        // Init Piano
        for (let i = 0; i < 48; i++) {
            const noteName = notes[i % 12];
            const fullNote = noteName + (Math.floor(i / 12) + 2);
            const key = document.createElement('div');
            key.className = `key ${noteName.includes('#') ? 'black' : 'white'}`;
            key.dataset.note = fullNote;
            key.onmousedown = () => { Tone.start(); synth.triggerAttackRelease(fullNote, "4n"); highlightNote(fullNote); };
            piano.appendChild(key);
        }

        // Init Fretboard
        guitarTuning.forEach((root, sIdx) => {
            const row = document.createElement('div');
            row.className = 'string';
            row.style.setProperty('--thick', [1, 1.2, 1.8, 2.2, 3, 3.8][sIdx] + "px");
            for (let f = 0; f <= 21; f++) {
                const note = Tone.Frequency(root).transpose(f).toNote();
                const fret = document.createElement('div');
                fret.className = `fret fret-${f}`;
                fret.dataset.note = note;
                fret.innerHTML = `<div class="string-wire"></div><div class="fret-dot"></div><div class="note-glow"></div>`;
                fret.onmousedown = () => { Tone.start(); synth.triggerAttackRelease(note, "4n"); highlightNote(note); };
                row.appendChild(fret);
            }
            fretboard.appendChild(row);
        });

        function setInv(val, btn) {
            currentInv = val;
            document.querySelectorAll('.inv-btn').forEach(b => b.classList.remove('active-inv'));
            btn.classList.add('active-inv');
            visualizeChord();
        }

        function highlightNote(note, isRoot = false) {
            const clean = Tone.Frequency(note).toNote();
            const nameOnly = clean.replace(/[0-9]/g, '');
            
            document.querySelectorAll(`.key[data-note="${clean}"]`).forEach(k => k.classList.add('active'));
            document.querySelectorAll(`.fret`).forEach(f => {
                if (Tone.Frequency(f.dataset.note).toNote() === clean) {
                    const g = f.querySelector('.note-glow');
                    g.classList.add('active');
                    g.innerText = nameOnly;
                    if(isRoot) g.classList.add('root-note');
                }
            });
        }

        async function visualizeChord() {
            clearVisuals();
            await Tone.start();
            const root = document.getElementById('rootSelect').value;
            const type = document.getElementById('typeSelect').value;
            const rootIdx = notes.indexOf(root);
            const intervals = type === 'major' ? [0, 4, 7] : [0, 3, 7];
            const triadNames = intervals.map(i => notes[(rootIdx + i) % 12]);
            
            // Piano Logic
            let pNotes = [...triadNames];
            let pOcts = [4, 4, 4];
            if(currentInv === 1) { pNotes = [pNotes[1], pNotes[2], pNotes[0]]; pOcts = [4, 4, 5]; }
            else if(currentInv === 2) { pNotes = [pNotes[2], pNotes[0], pNotes[1]]; pOcts = [4, 5, 5]; }
            
            const chord = pNotes.map((n, i) => n + pOcts[i]);
            chord.forEach((n, i) => highlightNote(n, (currentInv === 0 && i === 0)));

            // Fretboard Logic (All positions)
            document.querySelectorAll('.fret').forEach(f => {
                const n = f.dataset.note.replace(/[0-9]/g, '');
                if(triadNames.includes(n)) {
                    const g = f.querySelector('.note-glow');
                    g.classList.add('active');
                    g.innerText = n;
                    if(n === root) g.classList.add('root-note');
                }
            });
            synth.triggerAttackRelease(chord, "2n");
        }

        function clearVisuals() {
            document.querySelectorAll('.key, .note-glow').forEach(el => el.classList.remove('active', 'root-note'));
        }
    </script>
</body>
</html>
